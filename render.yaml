services:
  # Backend API
  - type: web
    name: omnicontent-api
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: GEMINI_API_KEY
        sync: false # User must set this in Render Dashboard
      - key: PORT
        value: 5000

  # Frontend Dashboard
  - type: static
    name: omnicontent-dashboard
    env: static
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishDir: dist
    envVars:
      - key: VITE_API_URL
        value: https://omnicontent-api.onrender.com/api # Replace with your backend URL
